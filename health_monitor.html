<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>健康监测分析 - 智慧换热站</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="//at.alicdn.com/t/c/font_5115287_4bas6dl1f8f.css">

  <style>
    /* --- 全局变量与基础样式 (保持与主页一致) --- */
    :root {
      --bg-color: #0f1a2b;
      --panel-bg: rgba(16, 42, 67, 0.6);
      --border-color: rgba(79, 172, 254, 0.3);
      --text-primary: #ffffff;
      --text-secondary: #b8cbe3;
      --accent-blue: #4facfe;
      --accent-cyan: #00f2fe;
      --accent-red: #ff3300;
      --accent-green: #00e676;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: "Microsoft YaHei", sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 主容器 */
    .monitor-container {
      width: 1920px;
      height: 1080px;
      background: radial-gradient(circle at center, #1b3352 0%, #0a1524 100%);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 15px;
      transform-origin: center center;
    }

    /* --- 1. 顶部：监测概览与控制区 --- */
    .header-section {
      height: 140px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      backdrop-filter: blur(10px);
    }

    /* 进度条/评分栏 */
    .progress-wrapper {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .progress-track {
      flex: 1;
      height: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      width: 0%;
      transition: width 0.3s ease;
      position: relative;
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    /* 扫描动画光效 */
    .progress-bar::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 10px;
      background: #fff;
      box-shadow: 0 0 15px #fff;
      filter: blur(2px);
    }

    .score-display {
      font-size: 32px;
      font-weight: bold;
      color: var(--accent-cyan);
      text-shadow: 0 0 15px var(--accent-cyan);
      min-width: 120px;
      text-align: right;
    }

    /* 数据统计行 */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .stat-val {
      color: #fff;
      font-weight: bold;
      font-size: 18px;
    }

    .stat-val.danger {
      color: var(--accent-red);
      font-size: 20px;
    }

    .btn-restart {
      padding: 8px 24px;
      background: rgba(0, 242, 254, 0.15);
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
    }

    .btn-restart:hover {
      background: var(--accent-cyan);
      color: #000;
      box-shadow: 0 0 20px var(--accent-cyan);
    }

    /* --- 主内容区：左右分栏 --- */
    .main-content {
      flex: 1;
      display: flex;
      gap: 20px;
      overflow: hidden;
      /* 防止溢出 */
    }

    /* --- 2. 左侧：分层监测结果列表 --- */
    .left-panel {
      flex: 0.4;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      height: 50px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-blue);
      letter-spacing: 1px;
    }

    .accordion-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    /* 滚动条隐藏 */
    .accordion-container::-webkit-scrollbar {
      width: 4px;
    }

    .accordion-container::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 2px;
    }

    .acc-item {
      margin-bottom: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.2);
      transition: all 0.3s;
    }

    .acc-header {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.02);
    }

    .acc-header:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .acc-title {
      font-size: 16px;
      color: #fff;
    }

    .acc-count {
      color: var(--accent-red);
      font-size: 14px;
      margin-right: 10px;
      font-weight: bold;
    }

    .acc-arrow {
      transition: transform 0.3s;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .acc-arrow.open {
      transform: rotate(180deg);
    }

    .acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .acc-body.open {
      max-height: 500px;
      /* 足够大即可 */
    }

    .error-item {
      padding: 12px 15px 12px 30px;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }

    .error-item:hover,
    .error-item.active {
      background: rgba(255, 51, 0, 0.1);
      color: #fff;
      border-left: 3px solid var(--accent-red);
      padding-left: 27px;
      /* 调整内边距保持文字位置 */
    }

    .error-item::before {
      content: '●';
      color: var(--accent-red);
      margin-right: 10px;
      font-size: 10px;
    }

    /* --- 3. 右侧：AI 交互与决策区 --- */
    .right-panel {
      flex: 0.6;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 聊天气泡 */
    .chat-msg {
      display: flex;
      gap: 15px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    .chat-msg.ai {
      align-self: flex-start;
    }

    .chat-msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #000;
      border: 1px solid var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .msg-content {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      line-height: 1.6;
      position: relative;
    }

    .chat-msg.ai .msg-content {
      border-top-left-radius: 0;
      border-color: var(--accent-blue);
    }

    .chat-msg.user .msg-content {
      border-top-right-radius: 0;
      background: rgba(79, 172, 254, 0.2);
    }

    /* 操作按钮区 */
    .action-area {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .btn-action {
      padding: 6px 15px;
      font-size: 12px;
      background: transparent;
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s;
    }

    .btn-action:hover {
      background: var(--accent-red);
      color: #fff;
    }

    .btn-action.synced {
      border-color: var(--accent-green);
      color: var(--accent-green);
      cursor: default;
    }

    .btn-action.synced:hover {
      background: transparent;
    }

    /* 底部输入框 */
    .input-area {
      height: 70px;
      border-top: 1px solid var(--border-color);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(0, 0, 0, 0.2);
    }

    .chat-input {
      flex: 1;
      height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 0 20px;
      color: #fff;
      outline: none;
    }

    .btn-send {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent-blue);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div id="app" class="monitor-container">

    <div class="header-section">
      <div class="progress-wrapper">
        <div v-if="isScanning" class="progress-track">
          <div class="progress-bar" :style="{ width: scanProgress + '%' }"></div>
        </div>
        <div v-else class="score-display">
          健康评分: <span :style="{ color: healthScore > 80 ? 'var(--accent-green)' : 'var(--accent-red)' }">{{ healthScore
            }}</span>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-item">
          <span>监测对象：</span>
          <span class="stat-val">38个</span>
        </div>
        <div class="stat-item">
          <span>总用时：</span>
          <span class="stat-val">{{ scanTimer }}</span>
        </div>
        <div class="stat-item">
          <span>发现异常：</span>
          <span class="stat-val danger">{{ totalErrors }}个</span>
        </div>
        <button class="btn-restart" @click="startScan">
          {{ isScanning ? '监测中...' : '再次监测' }}
        </button>
      </div>
    </div>

    <div class="main-content">

      <div class="left-panel">
        <div class="panel-title">检测项目清单</div>
        <div class="accordion-container">

          <div class="acc-item" v-for="cate in categories" :key="cate.id">
            <div class="acc-header" @click="toggleCategory(cate)">
              <span class="acc-title">{{ cate.title }}</span>
              <div style="display: flex; align-items: center;">
                <span v-if="cate.errorCount > 0" class="acc-count">异常: {{ cate.errorCount }}个</span>
                <span class="acc-arrow" :class="{ open: cate.isOpen }">▼</span>
              </div>
            </div>

            <div class="acc-body" :class="{ open: cate.isOpen }">
              <div v-for="item in cate.items" :key="item.id" class="error-item"
                :class="{ active: currentSelectedId === item.id }" @click="selectIssue(item)">
                {{ item.desc }}
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="right-panel">
        <div class="panel-title">AI 结果分析</div>

        <div class="chat-container" id="chatBox">
          <div v-for="(msg, index) in messages" :key="index" class="chat-msg" :class="msg.role">
            <div class="avatar">{{ msg.role === 'ai' ? '🤖' : '👤' }}</div>
            <div class="msg-content">
              <div v-html="msg.text"></div>

              <div v-if="msg.role === 'ai' && msg.hasAction" class="action-area">
                <button class="btn-action" :class="{ synced: msg.isSynced }" @click="syncToTask(msg)">
                  {{ msg.isSynced ? '✔ 已完成同步' : '⚡ 同步至任务列表' }}
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="input-area">
          <input type="text" class="chat-input" v-model="userInput" @keyup.enter="sendMessage"
            placeholder="针对当前问题询问 AI...">
          <button class="btn-send" @click="sendMessage">➤</button>
        </div>
      </div>

    </div>

  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

    createApp({
      setup() {
        // --- 状态数据 ---
        const isScanning = ref(false);
        const scanProgress = ref(0);
        const healthScore = ref(0);
        const scanTimer = ref("00:00:00");
        const userInput = ref("");
        const currentSelectedId = ref(null);

        // 模拟监测数据结构
        const categories = reactive([
          {
            id: 1, title: "系统连接和健康状态", isOpen: true, errorCount: 2,
            items: [
              {
                id: 101, desc: "1. 目前换热站实时温度105℃异常", type: "urgent",
                aiAnalysis: "目前换热站内温度显示过高，检测到是5分钟前突发性的，考虑站内环境温度表计异常。建议立即派人核查表计或检查是否有火灾隐患。"
              },
              {
                id: 102, desc: "2. 目前低区换热器换热效率为10%异常", type: "warning",
                aiAnalysis: "板换效率极低，且一二次侧温差过大。初步判断为板片严重结垢或反接。建议列入检修计划进行反冲洗。"
              }
            ]
          },
          {
            id: 2, title: "异常数据校验", isOpen: false, errorCount: 1,
            items: [
              {
                id: 201, desc: "1. 一次侧阀门开度0%但有大流量", type: "logic",
                aiAnalysis: "物理逻辑冲突：阀门反馈关闭但流量计读数很大。可能是阀门反馈信号故障或流量计漂移。建议优先检查阀门限位开关。"
              }
            ]
          },
          {
            id: 3, title: "经济运行情况", isOpen: false, errorCount: 1,
            items: [
              {
                id: 301, desc: "1. 夜间补水量异常偏高", type: "cost",
                aiAnalysis: "夜间补水量达到 5t/h，远超正常值。结合压力曲线分析，疑似二网末端存在泄漏或用户放水。建议排查高区管网。"
              }
            ]
          }
        ]);

        // 计算总异常数
        const totalErrors = computed(() => {
          return categories.reduce((sum, cate) => sum + cate.errorCount, 0);
        });

        // 聊天记录
        const messages = reactive([
          { role: 'ai', text: '体检已完成。左侧列出了检测到的异常项目，请点击查看详细分析。', hasAction: false }
        ]);

        // --- 方法逻辑 ---

        // 1. 模拟扫描过程
        const startScan = () => {
          isScanning.value = true;
          scanProgress.value = 0;
          healthScore.value = 0;
          scanTimer.value = "00:00:00";
          messages.length = 0; // 清空聊天

          let p = 0;
          const interval = setInterval(() => {
            p += 2;
            scanProgress.value = p;

            // 模拟时间跳动
            const sec = Math.floor(p / 100 * 600); // 假设一共耗时10分钟
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            scanTimer.value = `00:${m}:${s}`;

            if (p >= 100) {
              clearInterval(interval);
              isScanning.value = false;
              healthScore.value = 85; // 模拟最终得分
              messages.push({ role: 'ai', text: '监测完成！发现 ' + totalErrors.value + ' 个异常项，请点击左侧列表查看。', hasAction: false });
            }
          }, 30);
        };

        // 2. 折叠/展开
        const toggleCategory = (cate) => {
          cate.isOpen = !cate.isOpen;
        };

        // 3. 选中异常项 -> AI 分析
        const selectIssue = (item) => {
          currentSelectedId.value = item.id;
          // 添加用户点击动作（可选）
          // messages.push({ role: 'user', text: '分析项目：' + item.desc });

          // 模拟 AI 思考延迟
          setTimeout(() => {
            messages.push({
              role: 'ai',
              text: `<strong>针对 "${item.desc}" 的分析：</strong><br/>${item.aiAnalysis}`,
              hasAction: true,
              isSynced: false,
              relatedId: item.id
            });
            scrollToBottom();
          }, 300);
        };

        // 4. 同步至任务列表
        const syncToTask = (msg) => {
          if (msg.isSynced) return;
          msg.isSynced = true;
          // 这里可以添加实际的 API 调用逻辑
          console.log(`异常项 ID ${msg.relatedId} 已同步至任务列表`);
        };

        // 5. 发送消息
        const sendMessage = () => {
          if (!userInput.value.trim()) return;
          messages.push({ role: 'user', text: userInput.value });

          // 模拟 AI 回复
          setTimeout(() => {
            messages.push({
              role: 'ai',
              text: '收到您的反馈。已为您检索相关知识库，建议您携带万用表前往现场，检查表计的 4-20mA 信号输出是否正常。',
              hasAction: false
            });
            scrollToBottom();
          }, 1000);

          userInput.value = "";
        };

        const scrollToBottom = () => {
          nextTick(() => {
            const el = document.getElementById('chatBox');
            if (el) el.scrollTop = el.scrollHeight;
          });
        };

        // 页面缩放适配
        const handleResize = () => {
          const designWidth = 1920;
          const designHeight = 1080;
          const scale = Math.min(window.innerWidth / designWidth, window.innerHeight / designHeight);
          const app = document.getElementById('app');
          if (app) app.style.transform = `scale(${scale})`;
        };

        onMounted(() => {
          handleResize();
          window.addEventListener('resize', handleResize);
          // 自动开始一次扫描
          setTimeout(startScan, 500);
        });

        return {
          isScanning, scanProgress, healthScore, scanTimer, totalErrors,
          categories, messages, userInput, currentSelectedId,
          startScan, toggleCategory, selectIssue, syncToTask, sendMessage
        };
      }
    }).mount('#app');
  </script>
</body>

</html>
