<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>健康监测分析 - 智慧换热站</title>
  <script src="libs/vue.global.js"></script>
  <link rel="stylesheet" href="fonts/iconfont.css">

  <!-- 主题配置 -->
  <script src="theme-config.js"></script>

  <style>
    /* 在线链接服务仅供平台体验和调试使用，平台不承诺服务的稳定性，企业客户需下载字体包自行发布使用并做好备份。 */

    /* --- 1. 全局样式 (完全复刻原文件) --- */
    :root {
      --bg-color: #0f1a2b;
      --panel-bg: rgba(16, 42, 67, 0.6);
      --border-color: rgba(79, 172, 254, 0.3);
      --text-primary: #ffffff;
      --text-secondary: #b8cbe3;
      --accent-blue: #4facfe;
      --accent-cyan: #00f2fe;
      --accent-red: #ff3300;
      --accent-green: #00e676;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: "Microsoft YaHei", sans-serif;
      overflow: hidden;
      /* 防止滚动条 */
      transition: opacity 0.2s ease-in-out;
    }

    /* --- 2. 侧边导航栏 --- */
    .side-nav {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 110px;
      height: 100%;
      background: #081221;
      border-right: 1px solid var(--accent-blue);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      padding-top: 60px;
      transform: none !important;
    }

    .nav-wrapper {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      width: 100%;
    }

    .nav-item {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 15px 0;
      position: relative;
      transition: all 0.3s ease;
      color: oklch(1 0 0 / 0.6);
    }

    .nav-icon {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .nav-label {
      writing-mode: horizontal-tb !important;
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      letter-spacing: 1px;
      opacity: 1 !important;
      display: block;
    }

    /* 导航交互状态 */
    .nav-item:hover,
    .nav-item.active {
      background: oklch(0.6 0.15 200 / 0.15);
      color: #4facfe;
    }

    .nav-item.active .nav-label {
      color: var(--accent-blue);
      font-weight: bold;
    }

    .nav-item.active .nav-icon {
      transform: scale(1.1);
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #4facfe;
      box-shadow: 0 0 10px #4facfe;
    }

    /* --- 3. 主内容区域 --- */
    .main-container {
      flex: 1;
      margin-left: 110px;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 15px;
    }

    /* --- 4. 布局容器 (核心修改：与原文件保持一致的绝对定位布局) --- */
    .dashboard-root {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: left top;
      /* 关键：从左上角缩放 */
      display: flex;
      background-color: #0c1626
    }

    /* --- 3. 顶部 Header --- */
    .header-section {
      height: 120px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    /* 进度条 */
    .progress-wrapper {
      width: 100%;
      height: 30px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .progress-track {
      flex: 1;
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    .score-display {
      font-size: 28px;
      font-weight: bold;
      color: var(--accent-cyan);
      min-width: 120px;
      text-align: right;
    }

    /* 统计行 */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      font-size: 16px;
      color: var(--text-secondary);
    }

    .stat-val {
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      margin-left: 5px;
    }

    .stat-val.danger {
      color: var(--accent-red);
      font-size: 20px;
    }

    .btn-restart {
      padding: 6px 20px;
      background: rgba(0, 242, 254, 0.15);
      border: 1px solid var(--accent-cyan);
      color: var(--accent-cyan);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .btn-restart:hover {
      background: var(--accent-cyan);
      color: #000;
    }

    /* --- 4. 主内容区 --- */
    .main-content {
      flex: 1;
      display: flex;
      gap: 15px;
      overflow: hidden;
    }

    /* 左侧列表 */
    .left-panel {
      flex: 0.4;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      height: 48px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-size: 18px;
      font-weight: bold;
      color: var(--accent-blue);
    }

    .accordion-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .accordion-container::-webkit-scrollbar {
      width: 4px;
    }

    .accordion-container::-webkit-scrollbar-thumb {
      background: var(--border-color);
    }

    .acc-item {
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
    }

    .acc-header {
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .acc-header:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .acc-title {
      font-size: 16px;
      color: #fff;
    }

    .acc-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .acc-body.open {
      max-height: 600px;
    }

    .error-item {
      padding: 10px 15px 10px 30px;
      border-top: 1px dashed rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .error-item:hover,
    .error-item.active {
      background: rgba(255, 51, 0, 0.1);
      color: #fff;
      border-left: 3px solid var(--accent-red);
    }

    /* 右侧 AI 区 */
    .right-panel {
      flex: 0.6;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
    }

    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .chat-msg {
      display: flex;
      gap: 15px;
      max-width: 90%;
    }

    .chat-msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #000;
      border: 1px solid var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .msg-content {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 12px 15px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      line-height: 1.6;
    }

    .chat-msg.ai .msg-content {
      border-top-left-radius: 0;
      border-color: var(--accent-blue);
    }

    .chat-msg.user .msg-content {
      border-top-right-radius: 0;
      background: rgba(79, 172, 254, 0.2);
    }

    .btn-action {
      margin-top: 10px;
      padding: 5px 12px;
      font-size: 12px;
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      border-radius: 15px;
      cursor: pointer;
      background: transparent;
      transition: all 0.3s;
    }

    .btn-action:hover {
      background: var(--accent-red);
      color: #fff;
    }

    .btn-action.synced {
      border-color: var(--accent-green);
      color: var(--accent-green);
      cursor: default;
    }

    .btn-action.synced:hover {
      background: transparent;
    }

    .input-area {
      height: 60px;
      border-top: 1px solid var(--border-color);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.2);
    }

    .chat-input {
      flex: 1;
      height: 36px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      padding: 0 15px;
      color: #fff;
      outline: none;
    }

    .btn-send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-blue);
      border: none;
      color: #fff;
      cursor: pointer;
    }

    /* 白天模式样式 */
    .light-mode {
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%) !important;
      color: #1e293b !important;
    }

    .light-mode .dashboard-container {
      background: rgba(255, 255, 255, 0.9) !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
    }

    .light-mode .health-panel {
      background: rgba(255, 255, 255, 0.9) !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
    }

    .light-mode .panel-header {
      background: rgba(248, 250, 252, 0.9) !important;
      color: #1e40af !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
    }

    .light-mode .health-score {
      color: #1e40af !important;
    }

    .light-mode .health-value {
      color: #1e293b !important;
    }

    .light-mode .health-label {
      color: #64748b !important;
    }

    .light-mode .metric-item {
      background: rgba(248, 250, 252, 0.5) !important;
      border-color: rgba(37, 99, 235, 0.2) !important;
    }

    .light-mode .status-indicator {
      background: rgba(255, 255, 255, 0.9) !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
    }

    
    /* 白天模式样式支持 */
    body.light-mode {
      --bg-color: #f8fafc;
      --panel-bg: rgba(255, 255, 255, 0.9);
      --border-color: rgba(37, 99, 235, 0.3);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%) !important;
      color: #1e293b !important;
    }

    body.light-mode .dashboard-root {
      background-color: #f8fafc;
    }

    body.light-mode .side-nav {
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
    }
    
    body.light-mode .nav-item {
      color: #64748b;
    }
    
    body.light-mode .nav-item:hover,
    body.light-mode .nav-item.active {
      color: #2563eb;
      background: rgba(37, 99, 235, 0.1);
    }
    
    body.light-mode .nav-item .iconfont {
      color: #94a3b8;
    }
    
    body.light-mode .nav-item:hover .iconfont,
    body.light-mode .nav-item.active .iconfont {
      color: #2563eb;
    }

    body.light-mode .nav-item.active .nav-label {
      color: #2563eb !important;
      font-weight: bold;
    }

    body.light-mode .nav-item.active::after {
      background: #2563eb;
      box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
    }

    body.light-mode .glass-panel,
    body.light-mode .header-section,
    body.light-mode .stats-card,
    body.light-mode .detail-card {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(37, 99, 235, 0.2);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body.light-mode .progress-track {
      background: rgba(0, 0, 0, 0.05);
    }

    body.light-mode .score-display {
      color: #1e40af;
    }

    body.light-mode .stat-label {
      color: #64748b;
    }

    body.light-mode .stat-value {
      color: #1e293b;
    }

    body.light-mode .card-header {
      border-bottom-color: rgba(37, 99, 235, 0.1);
    }

    body.light-mode .card-title {
      color: #1e40af;
    }


    
  </style>
</head>

<body>
  <!-- 主题切换按钮 -->
  <div id="app" class="dashboard-root">
    <aside class="side-nav">
      <div class="nav-wrapper">
        <div class="nav-item" onclick="window.location.href='home.html'">
          <i class="iconfont nav-icon">&#xe603;</i>
          <div class="nav-label">首页</div>
        </div>
        <div class="nav-item" onclick="window.location.href='smart_heating_station_terminal.html'">
          <i class="iconfont nav-icon">&#xe84a;</i>
          <div class="nav-label">我的换热站</div>
        </div>
        <div class="nav-item" onclick="window.location.href='station_patrol.html'">
          <i class="iconfont nav-icon">&#xe65c;</i>
          <div class="nav-label">一键巡站</div>
        </div>
        <div class="nav-item" onclick="window.location.href='station_startup.html'">
          <i class="iconfont nav-icon">&#xe6db;</i>
          <div class="nav-label">一键启停</div>
        </div>
        <div class="nav-item active" onclick="window.location.href='health_monitor.html'">
          <i class="iconfont nav-icon">&#xe61f;</i>
          <div class="nav-label">健康监测</div>
        </div>
        <div class="nav-item" onclick="window.location.href='asset_inventory.html'">
          <i class="iconfont nav-icon">&#xe668;</i>
          <div class="nav-label">资产盘点</div>
        </div>
        <div class="nav-item" onclick="window.location.href='system_settings.html'">
          <i class="iconfont nav-icon">&#xe602;</i>
          <div class="nav-label">系统设置</div>
        </div>
      </div>
    </aside>

    <main class="main-container">
      <div class="header-section">
        <div class="progress-wrapper">
          <div v-if="isScanning" class="progress-track">
            <div class="progress-bar" :style="{ width: scanProgress + '%' }"></div>
          </div>
          <div v-else class="score-display">
            健康评分: <span :style="{ color: healthScore > 80 ? 'var(--accent-green)' : 'var(--accent-red)' }">{{
              healthScore
              }}</span>
          </div>
        </div>
        <div class="stats-row">
          <div><span>监测对象：</span><span class="stat-val">38个</span></div>
          <div><span>总用时：</span><span class="stat-val">{{ scanTimer }}</span></div>
          <div><span>发现异常：</span><span class="stat-val danger">{{ totalErrors }}个</span></div>
          <button class="btn-restart" @click="startScan">{{ isScanning ? '监测中...' : '再次监测' }}</button>
        </div>
      </div>

      <div class="main-content">
        <div class="left-panel">
          <div class="panel-title">检测项目清单</div>
          <div class="accordion-container">
            <div class="acc-item" v-for="cate in categories" :key="cate.id">
              <div class="acc-header" @click="toggleCategory(cate)">
                <span class="acc-title">{{ cate.title }}</span>
                <div style="display: flex; align-items: center;">
                  <span v-if="cate.errorCount > 0"
                    style="color: var(--accent-red); margin-right: 10px; font-weight: bold;">异常: {{ cate.errorCount
                    }}个</span>
                  <span style="color: var(--text-secondary); font-size: 12px;">{{ cate.isOpen ? '▲' : '▼' }}</span>
                </div>
              </div>
              <div class="acc-body" :class="{ open: cate.isOpen }">
                <div v-for="item in cate.items" :key="item.id" class="error-item"
                  :class="{ active: currentSelectedId === item.id }" @click="selectIssue(item)">
                  <span style="color:var(--accent-red); margin-right:8px;">●</span>{{ item.desc }}
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="panel-title">AI 结果分析</div>
          <div class="chat-container" id="chatBox">
            <div v-for="(msg, index) in messages" :key="index" class="chat-msg" :class="msg.role">
              <i class="iconfont">&#xe87d;</i>
              <div class="msg-content">
                <div v-html="msg.text"></div>
                <div v-if="msg.role === 'ai' && msg.hasAction">
                  <button class="btn-action" :class="{ synced: msg.isSynced }" @click="syncToTask(msg)">
                    {{ msg.isSynced ? '✔ 已完成同步' : '⚡ 同步至任务列表' }}
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="input-area">
            <input type="text" class="chat-input" v-model="userInput" @keyup.enter="sendMessage"
              placeholder="针对当前问题询问 AI...">
            <button class="btn-send" @click="sendMessage">➤</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted, nextTick } = Vue;

    createApp({
      setup() {
        const isScanning = ref(false);
        const scanProgress = ref(0);
        const healthScore = ref(0);
        const scanTimer = ref("00:00:00");
        const userInput = ref("");
        const currentSelectedId = ref(null);

        const categories = reactive([
          {
            id: 1, title: "系统连接和健康状态", isOpen: true, errorCount: 2,
            items: [
              { id: 101, desc: "1. 目前换热站实时温度105℃异常", aiAnalysis: "目前换热站内温度显示过高，检测到是5分钟前突发性的，考虑站内环境温度表计异常。建议立即派人核查表计或检查是否有火灾隐患。" },
              { id: 102, desc: "2. 目前低区换热器换热效率为10%异常", aiAnalysis: "板换效率极低，且一二次侧温差过大。初步判断为板片严重结垢或反接。建议列入检修计划进行反冲洗。" }
            ]
          },
          {
            id: 2, title: "异常数据校验", isOpen: false, errorCount: 1,
            items: [{ id: 201, desc: "1. 一次侧阀门开度0%但有大流量", aiAnalysis: "物理逻辑冲突：阀门反馈关闭但流量计读数很大。可能是阀门反馈信号故障或流量计漂移。建议优先检查阀门限位开关。" }]
          },
          {
            id: 3, title: "经济运行情况", isOpen: false, errorCount: 1,
            items: [{ id: 301, desc: "1. 夜间补水量异常偏高", aiAnalysis: "夜间补水量达到 5t/h，远超正常值。结合压力曲线分析，疑似二网末端存在泄漏或用户放水。建议排查高区管网。" }]
          }
        ]);

        const totalErrors = computed(() => categories.reduce((sum, c) => sum + c.errorCount, 0));
        const messages = reactive([{ role: 'ai', text: '体检已完成。左侧列出了检测到的异常项目，请点击查看详细分析。', hasAction: false }]);

        // 核心：复刻原文件的缩放逻辑
        const handleResize = () => {
          const designWidth = 1920;
          const designHeight = 1080;
          const clientWidth = document.documentElement.clientWidth;
          const clientHeight = document.documentElement.clientHeight;
          const scale = Math.min(clientWidth / designWidth, clientHeight / designHeight);

          const app = document.getElementById('app');
          if (app) {
            app.style.transform = `scale(${scale})`;
            const left = (clientWidth - designWidth * scale) / 2;
            const top = (clientHeight - designHeight * scale) / 2;
            app.style.left = `${left}px`;
            app.style.top = `${top}px`;
          }
        };

        const startScan = () => {
          isScanning.value = true; scanProgress.value = 0; healthScore.value = 0; messages.length = 0;
          let p = 0;
          const interval = setInterval(() => {
            p += 2; scanProgress.value = p;
            const sec = Math.floor(p / 100 * 600);
            scanTimer.value = `00:${Math.floor(sec / 60).toString().padStart(2, '0')}:${(sec % 60).toString().padStart(2, '0')}`;
            if (p >= 100) {
              clearInterval(interval); isScanning.value = false; healthScore.value = 85;
              messages.push({ role: 'ai', text: '监测完成！发现 ' + totalErrors.value + ' 个异常项，请点击左侧列表查看。', hasAction: false });
            }
          }, 30);
        };

        const toggleCategory = (cate) => cate.isOpen = !cate.isOpen;
        const selectIssue = (item) => {
          currentSelectedId.value = item.id;
          setTimeout(() => {
            messages.push({ role: 'ai', text: `<strong>针对 "${item.desc}" 的分析：</strong><br/>${item.aiAnalysis}`, hasAction: true, isSynced: false, relatedId: item.id });
            nextTick(() => document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight);
          }, 300);
        };
        const syncToTask = (msg) => { if (!msg.isSynced) msg.isSynced = true; };
        const sendMessage = () => {
          if (!userInput.value.trim()) return;
          messages.push({ role: 'user', text: userInput.value });
          setTimeout(() => {
            messages.push({ role: 'ai', text: '收到反馈。已检索相关知识库，建议检查信号输出是否正常。', hasAction: false });
            nextTick(() => document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight);
          }, 1000);
          userInput.value = "";
        };

        onMounted(() => {
          setTimeout(startScan, 500);
        });

        // 导航切换函数
        const switchNav = (el) => {
          const items = document.querySelectorAll('.nav-item');
          items.forEach(item => item.classList.remove('active'));
          el.classList.add('active');
          console.log("已切换至: " + el.querySelector('.nav-label').innerText);
        };

        onMounted(() => {
          handleResize();
          window.addEventListener('resize', handleResize);
        });

        return {
          isScanning, scanProgress, healthScore, scanTimer, totalErrors, categories, messages, userInput, currentSelectedId,
          startScan, toggleCategory, selectIssue, syncToTask, sendMessage
        };
      }
    }).mount('#app');

    // 全局缩放适配函数
    function handleResize() {
      const designWidth = 1920;
      const designHeight = 1080;
      const clientWidth = document.documentElement.clientWidth;
      const clientHeight = document.documentElement.clientHeight;

      const scale = Math.min(clientWidth / designWidth, clientHeight / designHeight);

      const app = document.getElementById('app');
      if (app) {
        app.style.transform = `scale(${scale})`;
        const left = (clientWidth - designWidth * scale) / 2;
        const top = (clientHeight - designHeight * scale) / 2;
        app.style.left = `${left}px`;
        app.style.top = `${top}px`;
      }
    }

    // 页面跳转前重置缩放状态
    window.addEventListener('beforeunload', () => {
      document.body.style.opacity = '0';
    });

    // 页面加载完成后立即应用缩放
    document.addEventListener('DOMContentLoaded', () => {
      handleResize();
      // 页面加载完成后淡入
      setTimeout(() => {
        document.body.style.opacity = '1';
      }, 50);
    });

    // 全局初始化入口 (与其他页面保持一致)
    function initApp() {
      handleResize();
    }

    // 唯一启动监听
    window.addEventListener('load', initApp);
    window.addEventListener('resize', handleResize);
  </script>
</body>
