<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>系统设置 - 智慧换热站</title>
  <script src="libs/vue.global.js"></script>
  <link rel="stylesheet" href="fonts/iconfont.css">
  <script src="theme-config.js"></script>

  <style>
    /* --- 1. 深度优化后的配色方案 --- */
    :root {
      /* 深色模式配色：极客电光风格 */
      --bg-dark-gradient: radial-gradient(circle at 50% 50%, #101826 0%, #080c14 100%);
      --panel-bg: rgba(16, 24, 40, 0.75);
      /* 毛玻璃底色 */
      --border-tech: rgba(0, 242, 254, 0.25);
      /* 科技青边框 */
      --text-main: #e2e8f0;
      --text-dim: #94a3b8;
      --accent-cyan: #00f2fe;
      /* 电光青 */
      --accent-blue: #3b82f6;
      --glow-cyan: 0 0 15px rgba(0, 242, 254, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-dark-gradient);
      color: var(--text-main);
      font-family: "Inter", "Microsoft YaHei", sans-serif;
      overflow: hidden;
      transition: opacity 0.3s ease;
    }

    /* 根容器：确保缩放目标正确 */
    .dashboard-root {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: left top;
      display: flex;
      background-color: #080c14;
    }

    /* 侧边导航 */
    .side-nav {
      width: 110px;
      height: 100%;
      background: rgba(5, 10, 20, 0.95);
      border-right: 1px solid var(--border-tech);
      display: flex;
      flex-direction: column;
      padding-top: 60px;
      flex-shrink: 0;
      z-index: 100;
    }

    .nav-item {
      width: 100%;
      padding: 20px 0;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-dim);
      transition: all 0.3s;
    }

    .nav-item.active {
      color: var(--accent-cyan);
      background: linear-gradient(90deg, rgba(0, 242, 254, 0.1) 0%, transparent 100%);
      border-left: 3px solid var(--accent-cyan);
    }

    .nav-icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .nav-label {
      font-size: 13px;
      letter-spacing: 1px;
    }

    /* 主内容区：移除 calc 宽度冲突 */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 40px 60px;
      overflow-y: auto;
      backdrop-filter: blur(5px);
    }

    .page-header {
      margin-bottom: 50px;
      border-left: 5px solid var(--accent-cyan);
      padding-left: 20px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
    }

    /* 设置网格布局 */
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .settings-card {
      background: var(--panel-bg);
      border: 1px solid var(--border-tech);
      border-radius: 16px;
      padding: 30px;
      box-shadow: inset 0 0 20px rgba(0, 242, 254, 0.05);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .settings-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--glow-cyan);
      border-color: var(--accent-cyan);
    }

    .card-header {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card-icon {
      font-size: 28px;
      color: var(--accent-cyan);
      margin-right: 15px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }

    .setting-item {
      margin-bottom: 25px;
    }

    .setting-label {
      display: block;
      margin-bottom: 12px;
      color: var(--text-dim);
      font-size: 15px;
    }

    .setting-input,
    .setting-select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      transition: border 0.3s;
    }

    .setting-input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      background: rgba(0, 242, 254, 0.05);
    }

    /* 开关组件美化 */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .switch {
      position: relative;
      width: 56px;
      height: 28px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      cursor: pointer;
    }

    .switch.active {
      background: var(--accent-cyan);
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    .switch-slider {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 22px;
      height: 22px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s cubic-bezier(0.18, 0.89, 0.35, 1.15);
    }

    .switch.active .switch-slider {
      transform: translateX(28px);
    }

    /* 按钮组 */
    .button-group {
      display: flex;
      gap: 20px;
      margin-top: 50px;
    }

    .btn {
      padding: 14px 35px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      border: none;
      font-size: 16px;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      color: #080c14;
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: scale(1.05);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--accent-cyan);
    }

    /* 白天模式兼容逻辑 */
    .light-mode .dashboard-root {
      background-color: #f1f5f9;
      background: none;
    }

    .light-mode .side-nav {
      background: #fff;
      border-right-color: #e2e8f0;
    }

    .light-mode .settings-card {
      background: #fff;
      border-color: #cbd5e1;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .light-mode .page-title,
    .light-mode .card-title {
      color: #1e293b;
    }

    .light-mode .setting-input {
      background: #f8fafc;
      color: #1e293b;
      border-color: #cbd5e1;
    }
  </style>
</head>

<body>
  <div class="dashboard-root" id="app">
    <aside class="side-nav">
      <div class="nav-wrapper">
        <div class="nav-item" onclick="window.location.href='home.html'">
          <i class="iconfont nav-icon">&#xe603;</i>
          <div class="nav-label">首页</div>
        </div>
        <div class="nav-item" onclick="window.location.href='smart_heating_station_terminal.html'">
          <i class="iconfont nav-icon">&#xe84a;</i>
          <div class="nav-label">我的换热站</div>
        </div>
        <div class="nav-item active" onclick="window.location.href='system_settings.html'">
          <i class="iconfont nav-icon">&#xe602;</i>
          <div class="nav-label">系统设置</div>
        </div>
      </div>
    </aside>

    <main class="main-container">
      <div class="page-header">
        <h1 class="page-title">系统设置</h1>
      </div>

      <div class="settings-grid">
        <div class="settings-card">
          <div class="card-header">
            <i class="iconfont card-icon">&#xe602;</i>
            <h2 class="card-title">基本设置</h2>
          </div>
          <div class="setting-item">
            <label class="setting-label">换热站名称</label>
            <input type="text" class="setting-input" v-model="settings.stationName">
          </div>
          <div class="setting-item">
            <label class="setting-label">数据刷新频率</label>
            <select class="setting-select" v-model="settings.refreshRate">
              <option value="5000">5秒（标准）</option>
              <option value="1000">1秒（高频）</option>
            </select>
          </div>
        </div>

        <div class="settings-card">
          <div class="card-header">
            <i class="iconfont card-icon">&#xe623;</i>
            <h2 class="card-title">监控报警</h2>
          </div>
          <div class="setting-item">
            <div class="switch-container">
              <label class="setting-label">温度阈值报警</label>
              <div class="switch" :class="{ active: settings.tempAlarm }"
                @click="settings.tempAlarm = !settings.tempAlarm">
                <div class="switch-slider"></div>
              </div>
            </div>
          </div>
          <div class="setting-item">
            <div class="switch-container">
              <label class="setting-label">压力波动报警</label>
              <div class="switch" :class="{ active: settings.pressureAlarm }"
                @click="settings.pressureAlarm = !settings.pressureAlarm">
                <div class="switch-slider"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-card">
          <div class="card-header">
            <i class="iconfont card-icon">&#xe634;</i>
            <h2 class="card-title">视觉效果</h2>
          </div>
          <div class="setting-item">
            <div class="switch-container">
              <label class="setting-label">背景粒子效果</label>
              <div class="switch" :class="{ active: settings.particles }"
                @click="settings.particles = !settings.particles">
                <div class="switch-slider"></div>
              </div>
            </div>
          </div>
          <div class="setting-item">
            <div class="switch-container">
              <label class="setting-label">白天模式</label>
              <div class="switch" :class="{ active: settings.themeMode === 'light' }" @click="toggleThemeMode">
                <div class="switch-slider"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-primary" @click="saveSettings">保存应用配置</button>
        <button class="btn btn-secondary" @click="resetSettings">恢复初始状态</button>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const settings = ref({
          stationName: '智慧换热站 A-01',
          refreshRate: 5000,
          tempAlarm: true,
          pressureAlarm: true,
          particles: true,
          themeMode: 'dark'
        });

        const toggleThemeMode = () => {
          const newTheme = settings.value.themeMode === 'dark' ? 'light' : 'dark';
          settings.value.themeMode = newTheme;
          document.body.classList.toggle('light-mode', newTheme === 'light');
          localStorage.setItem('theme', newTheme);
        };

        const saveSettings = () => {
          localStorage.setItem('heatStationSettings', JSON.stringify(settings.value));
          alert('配置已成功应用');
        };

        const resetSettings = () => {
          if (confirm('确认恢复默认配置？')) {
            localStorage.removeItem('heatStationSettings');
            location.reload();
          }
        };

        onMounted(() => {
          const saved = localStorage.getItem('heatStationSettings');
          if (saved) settings.value = JSON.parse(saved);

          const savedTheme = localStorage.getItem('theme') || 'dark';
          settings.value.themeMode = savedTheme;
          document.body.classList.toggle('light-mode', savedTheme === 'light');

          handleResize();
          window.addEventListener('resize', handleResize);
        });

        return { settings, toggleThemeMode, saveSettings, resetSettings };
      }
    }).mount('#app');

    function handleResize() {
      const designWidth = 1920;
      const designHeight = 1080;
      const clientWidth = document.documentElement.clientWidth;
      const clientHeight = document.documentElement.clientHeight;
      const scale = Math.min(clientWidth / designWidth, clientHeight / designHeight);
      const app = document.getElementById('app');

      if (app) {
        app.style.transform = `scale(${scale})`;
        app.style.left = `${(clientWidth - designWidth * scale) / 2}px`;
        app.style.top = `${(clientHeight - designHeight * scale) / 2}px`;
      }
    }
  </script>
</body>

</html>
