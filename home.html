<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧换热站智能终端</title>
  <script src="libs/vue.global.js"></script>
  <style>
    /* 在线链接服务仅供平台体验和调试使用，平台不承诺服务的稳定性，企业客户需下载字体包自行发布使用并做好备份。 */
  </style>
  <link rel="stylesheet" href="fonts/iconfont.css">

  <!-- 主题配置 -->
  <script src="theme-config.js"></script>

  <style>
    :root {
      /* 核心颜色定义 */
      --tech-blue: #00a8ff;
      --white-glow: 0 0 10px oklch(1 0 0 / 0.9), 0 0 20px oklch(1 0 0 / 0.4);
      --card-bg: oklch(0.15 0.03 250 / 0.8);
      --border-blue: oklch(0.7 0.15 200 / 0.4);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background-color: var(--bg-dark);
      background: linear-gradient(135deg, #0a1929 0%, #001e3c 50%, #0a1929 100%);
      color: var(--text-primary);
      font-family: "Microsoft YaHei", sans-serif;
      transition: opacity 0.2s ease-in-out;
    }

    /* 布局结构 */
    .dashboard-root {
      width: 1920px;
      height: 1080px;
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: left top;
      display: flex;
      background-color: #0c1626;
    }

    /* 白天模式支持 */
    body.light-mode {
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%) !important;
      color: #1e293b !important;
    }

    body.light-mode .dashboard-root {
      background-color: #f8fafc;
    }

    /* 标题样式 */
    .nav-header {
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: oklch(0 0 0 / 0.4);
      border-bottom: 2px solid var(--border-blue);
      box-shadow: 0 5px 15px oklch(0.7 0.15 200 / 0.1);
      z-index: 10;
      flex-shrink: 0;
      width: 100%;
    }

    .glow-title {
      color: #ffffff;
      font-size: 2rem;
      letter-spacing: 6px;
      font-weight: bold;
      text-shadow: var(--white-glow);
      margin: 0;
    }

    body.light-mode .glow-title {
      text-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
      color: #1e40af;
    }

    body.light-mode .grid-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #cbd5e1;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      color: #1e293b;
    }

    body.light-mode .grid-card:hover {
      background: #ffffff;
      border-color: #2563eb;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
    }

    body.light-mode .nav-icon {
      color: #2563eb;
      text-shadow: none;
    }

    body.light-mode .label {
      color: #1e293b;
      text-shadow: none;
    }

    /* 炫酷科技背景：扫描线效果 */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(oklch(0.1 0 0 / 0) 50%, oklch(0.7 0.15 200 / 0.05) 50%),
        linear-gradient(90deg, oklch(0.7 0.15 200 / 0.02) 1px, transparent 1px),
        linear-gradient(oklch(0.7 0.15 200 / 0.02) 1px, transparent 1px);
      background-size: 100% 4px, 60px 60px, 60px 60px;
      z-index: 0;
      pointer-events: none;
    }



    /* 主容器布局 */
    .main-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      position: relative;
      z-index: 5;
    }

    /* 3x3 矩阵功能区 */
    .function-grid {
      margin-left: 0;
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 25px;
      position: relative;
      z-index: 10;
      margin-top: -200px;
      padding-top: 200px;
    }

    .grid-card {
      background: var(--card-bg);
      border: 1px solid var(--border-blue);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.4s ease;
      cursor: pointer;
      z-index: 5;
    }

    .grid-card::before,
    .grid-card::after {
      content: "";
      position: absolute;
      width: 15px;
      height: 15px;
      border: 2px solid var(--tech-blue);
    }

    .grid-card::before {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
    }

    .grid-card::after {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
    }

    /* 中心模块"我的换热站"基础样式 */
    .center-module {
      border-color: var(--border-blue);
      background: var(--card-bg);
      box-shadow: none;
    }

    .center-module::before,
    .center-module::after {
      border-color: var(--border-blue);
    }

    /* 中心模块鼠标悬停效果 */
    .center-module:hover {
      border-color: #ffffff;
      background: radial-gradient(circle, oklch(1 0 0 / 0.15) 0%, transparent 80%);
      box-shadow: 0 0 30px oklch(0.7 0.15 200 / 0.3);
    }

    .center-module:hover::before,
    .center-module:hover::after {
      border-color: #ffffff;
    }

    .grid-card svg {
      width: 55px;
      height: 55px;
      fill: var(--tech-blue);
      margin-bottom: 20px;
      filter: drop-shadow(0 0 5px var(--tech-blue));
    }

    .grid-card .iconfont {
      font-size: 40px;
      color: var(--tech-blue);
      margin-bottom: 6px;
      filter: drop-shadow(0 0 5px var(--tech-blue));
    }

    .label {
      font-size: 1.4rem;
      color: #a0c4ff;
      letter-spacing: 2px;
    }

    /* 中心模块标签基础样式 */
    .center-module .label {
      color: #a0c4ff;
      text-shadow: none;
    }

    /* 中心模块SVG基础样式 */
    .center-module svg {
      fill: var(--tech-blue);
      filter: drop-shadow(0 0 5px var(--tech-blue));
    }

    /* 中心模块鼠标悬停时标签样式 */
    .center-module:hover .label {
      color: #ffffff;
      text-shadow: var(--white-glow);
    }

    /* 中心模块鼠标悬停时SVG样式 */
    .center-module:hover svg {
      fill: #ffffff;
      filter: drop-shadow(0 0 10px oklch(1 0 0 / 0.8));
    }

    /* 中心模块鼠标悬停时iconfont样式 */
    .center-module:hover .iconfont {
      color: #ffffff;
      filter: drop-shadow(0 0 10px oklch(1 0 0 / 0.8));
    }

    .active-module:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #ffffff;
      background: radial-gradient(circle, oklch(1 0 0 / 0.15) 0%, transparent 80%);
      box-shadow: 0 0 30px oklch(0.7 0.15 200 / 0.3);
    }

    .active-module:hover::before,
    .active-module:hover::after {
      border-color: #ffffff;
    }

    .active-module:hover .label {
      color: #ffffff;
      text-shadow: var(--white-glow);
    }

    .active-module:hover svg {
      fill: #ffffff;
      filter: drop-shadow(0 0 10px oklch(1 0 0 / 0.8));
    }

    .active-module:hover .iconfont {
      color: #ffffff;
      filter: drop-shadow(0 0 10px oklch(1 0 0 / 0.8));
    }

    .empty-slot {
      border: 1px dashed oklch(0.7 0.15 200 / 0.1);
      background: transparent;
      pointer-events: none;
    }

    /* 白天模式样式 */
    .light-mode {
      background: radial-gradient(circle at center, #f8fafc 0%, #e2e8f0 100%) !important;
      color: #1e293b !important;
    }

    .light-mode .grid-card {
      background: rgba(255, 255, 255, 0.9) !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
    }

    .light-mode .center-module {
      background: rgba(255, 255, 255, 0.9) !important;
      border-color: rgba(37, 99, 235, 0.3) !important;
    }

    .light-mode .grid-card:hover,
    .light-mode .center-module:hover {
      background: rgba(248, 250, 252, 0.95) !important;
      border-color: #2563eb !important;
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.2) !important;
    }

    .light-mode .label {
      color: #1e40af !important;
    }

    .light-mode .description {
      color: #64748b !important;
    }

    .light-mode .grid-card svg,
    .light-mode .grid-card .iconfont {
      fill: #2563eb !important;
      color: #2563eb !important;
      filter: drop-shadow(0 0 5px #2563eb) !important;
    }
  </style>
</head>

<body>

  <div class="dashboard-root" id="app">
    <main class="main-container">
      <header class="nav-header">
        <h2 class="glow-title">换热站智能终端控制中心</h2>
      </header>

      <section class="function-grid">
        <div class="grid-card active-module" onclick="window.location.href='station_patrol.html'">
          <i class="iconfont nav-icon">&#xe65c;</i>
          <div class="label">一键巡站</div>
        </div>
        <div class="grid-card empty-slot"></div>
        <div class="grid-card active-module" onclick="window.location.href='health_monitor.html'">
          <i class="iconfont nav-icon">&#xe61f;</i>
          <div class="label">健康监测分析</div>
        </div>

        <div class="grid-card empty-slot"></div>

        <div class="grid-card active-module center-module"
          onclick="window.location.href='smart_heating_station_terminal.html'">

          <i class="iconfont nav-icon">&#xe84a;</i>
          <div class="label">我的换热站</div>
        </div>

        <div class="grid-card empty-slot"></div>

        <div class="grid-card active-module" onclick="window.location.href='station_startup.html'">
          <i class="iconfont nav-icon">&#xe6db;</i>
          <div class="label">一键启停</div>
        </div>
        <div class="grid-card empty-slot"></div>
        <div class="grid-card active-module" onclick="window.location.href='asset_inventory.html'">
          <i class="iconfont nav-icon">&#xe668;</i>
          <div class="label">资产盘点</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;

    createApp({
      setup() {
        const currentTime = ref('');

        // 更新时间
        const updateTime = () => {
          const now = new Date();
          currentTime.value = now.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
          });
        };

        onMounted(() => {
          updateTime();
          setInterval(updateTime, 1000);
        });

        return {
          currentTime
        };
      }
    }).mount('#app');

    // 全局缩放适配函数
    function handleResize() {
      const designWidth = 1920;
      const designHeight = 1080;
      const clientWidth = document.documentElement.clientWidth;
      const clientHeight = document.documentElement.clientHeight;

      const scale = Math.min(clientWidth / designWidth, clientHeight / designHeight);

      const app = document.getElementById('app');
      if (app) {
        app.style.transform = `scale(${scale})`;
        const left = (clientWidth - designWidth * scale) / 2;
        const top = (clientHeight - designHeight * scale) / 2;
        app.style.left = `${left}px`;
        app.style.top = `${top}px`;
      }
    }

    // 页面跳转前重置缩放状态
    window.addEventListener('beforeunload', () => {
      document.body.style.opacity = '0';
    });

    // 页面加载完成后立即应用缩放
    document.addEventListener('DOMContentLoaded', () => {
      handleResize();
      // 页面加载完成后淡入
      setTimeout(() => {
        document.body.style.opacity = '1';
      }, 50);
    });

    // 全局初始化入口
    function initApp() {
      handleResize();
    }

    // 唯一启动监听
    window.addEventListener('load', initApp);
    window.addEventListener('resize', handleResize);
  </script>
</body>

</html>
